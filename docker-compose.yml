name: at-cleanup

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: at-cleanup
    networks:
      - bsky
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_SERVE_CONFIG=/config/serve.at-cleanup.json
      - TS_TAILSCALED_EXTRA_ARGS=--port=0
      - TS_AUTH_ONCE=true
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    command: sh -c "rm -f /var/run/tailscale/tailscaled.sock && /usr/local/bin/containerboot"
    volumes:
      - ./serve.json:/config/serve.json:ro
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    stop_grace_period: 60s
    networks:
      - bsky
    env_file: .env
    environment:
      POSTGRES_DB: bsky
      POSTGRES_USER: bsky
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsky"]
      interval: 5s
      timeout: 3s
      retries: 20

  search:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: unless-stopped
    networks:
      bsky:
        aliases:
          - search-app
    depends_on:
      tailscale:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  tailscale-state:
    name: at-cleanup_tailscale-state
  tailscale-sock:
    name: at-cleanup_tailscale-sock

networks:
  bsky:
    name: at-cleanup_bsky
    driver: bridge
